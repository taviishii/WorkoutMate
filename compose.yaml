version: '3.3'
services:
  mongodb:
    image: mongo:5
    container_name: wm_mongodb
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    container_name: wm_backend
    ports:
      - '6060:6060'
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - mongodb
  frontend:
    build: ./frontend
    env_file:
      - ./frontend/.env
    container_name: wm_frontend
    ports:
      - '3000:3000'
    volumes:
      - ./frontend:/app
      - /app/node_modules
    stdin_open: true
    tty: true
volumes:
  mongodb_data:
